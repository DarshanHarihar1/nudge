name: Keep Warm

on:
  schedule:
    # Every 10 minutes — prevents Render cold starts and Supabase inactivity pause
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          : "${APP_URL:?Repository secret APP_URL is not set}"
          APP_URL="${APP_URL%/}"  # strip trailing slash to avoid a //path 404
          curl -sf "${APP_URL}/health" || echo "Health check failed (non-fatal)"
