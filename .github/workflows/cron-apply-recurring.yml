name: Apply Recurring Items

on:
  schedule:
    # 00:05 IST = 18:35 UTC previous day
    - cron: "35 18 * * *"
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger apply-recurring endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          : "${APP_URL:?Repository secret APP_URL is not set}"
          : "${CRON_SECRET:?Repository secret CRON_SECRET is not set}"
          curl -sf -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/cron/apply-recurring"
