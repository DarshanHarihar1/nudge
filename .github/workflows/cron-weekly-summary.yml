name: Weekly Summary

on:
  schedule:
    # Sunday 19:00 IST = Sunday 13:30 UTC
    - cron: "30 13 * * 0"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly summary
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          : "${APP_URL:?Repository secret APP_URL is not set}"
          : "${CRON_SECRET:?Repository secret CRON_SECRET is not set}"
          APP_URL="${APP_URL%/}"  # strip trailing slash to avoid a //path 404
          status=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/cron/weekly-summary")
          echo "HTTP $status"
          cat /tmp/body.txt; echo
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::weekly-summary failed with HTTP $status (401 = CRON_SECRET mismatch with the API server)"
            exit 1
          fi
