name: Expense Logging Reminders

on:
  schedule:
    # 09:00 IST = 03:30 UTC
    - cron: "30 3 * * *"
    # 13:00 IST = 07:30 UTC
    - cron: "30 7 * * *"
    # 19:00 IST = 13:30 UTC
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger expense-reminder endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          : "${APP_URL:?Repository secret APP_URL is not set}"
          : "${CRON_SECRET:?Repository secret CRON_SECRET is not set}"
          APP_URL="${APP_URL%/}"
          status=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/cron/expense-reminder")
          echo "HTTP $status"
          cat /tmp/body.txt; echo
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::expense-reminder failed with HTTP $status"
            exit 1
          fi
