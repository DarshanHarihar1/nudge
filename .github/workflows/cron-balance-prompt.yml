name: Balance Prompt

on:
  schedule:
    # Every 14 days at 10:00 IST = 04:30 UTC
    # GitHub Actions doesn't support "every N days" natively, so this runs on
    # the 1st and 15th of each month as the closest approximation to biweekly.
    - cron: "30 4 1,15 * *"
  workflow_dispatch:

jobs:
  prompt:
    runs-on: ubuntu-latest
    steps:
      - name: Send balance prompt
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          : "${APP_URL:?Repository secret APP_URL is not set}"
          : "${CRON_SECRET:?Repository secret CRON_SECRET is not set}"
          status=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/cron/balance-prompt")
          echo "HTTP $status"
          cat /tmp/body.txt; echo
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::balance-prompt failed with HTTP $status (401 = CRON_SECRET mismatch with the API server)"
            exit 1
          fi
